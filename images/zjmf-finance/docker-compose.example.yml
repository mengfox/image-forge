services:
  zjmf-finance:
    build:
      context: ./images/zjmf-finance
      dockerfile: Dockerfile
    image: mengfox/zjmf-finance:latest
    container_name: zjmf-finance
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Shanghai
      CRON_ENABLED: "true"
      CRON_COMMAND: "php /var/www/html/think cron"
      CRON_INTERVAL_SECONDS: "900"
      CRON_RUN_ON_START: "false"
      SESSION_DIR: "/tmp/session"
    volumes:
      - ../../data/zjmf-finance:/var/www/html
      - ../../data/zjmf-finance-session:/tmp/session
