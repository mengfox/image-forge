[program:lsky-queue]
directory=/var/www/html
command=php artisan queue:work --verbose --sleep=3 --tries=3 --timeout=60
user=www-data
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/lsky-queue.log
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true