[program:lsky-schedule]
directory=/var/www/html
command=php artisan schedule:work
user=www-data
autostart=true
autorestart=true
priority=31
stdout_logfile=/var/log/supervisor/lsky-schedule.log
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true