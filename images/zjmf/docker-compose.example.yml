services:
  zjmf:
    build:
      context: ../..
      dockerfile: images/zjmf/Dockerfile
      args:
        TZ: Asia/Shanghai
        APP_SOURCE_SUBDIR: 10.4.6
    pull_policy: never
    container_name: zjmf-app
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      TZ: Asia/Shanghai
      APP_DIR: /var/www/html
      ENABLE_SWOOLE_LOADER: ${ENABLE_SWOOLE_LOADER:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ${APP_DATA_PATH:-./data/zjmf}:/var/www/html
    restart: unless-stopped