name: Build Lsky Runtime v2

on:
  push:
    branches:
      - main
    tags:
      - "lsky-runtime-v*"
    paths:
      - ".github/workflows/build-lskypro-v2.yml"
      - "images/lskypro-v2/**"
  pull_request:
    paths:
      - ".github/workflows/build-lskypro-v2.yml"
      - "images/lskypro-v2/**"
  workflow_dispatch:

concurrency:
  group: build-lskypro-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Image Name
        id: prep
        shell: bash
        run: |
          echo "dockerhub_image=docker.io/mengfox/lsky-runtime" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Image Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.dockerhub_image }}
          tags: |
            type=raw,value=v2
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=lsky-runtime
            org.opencontainers.image.description=Lsky runtime image

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./images/lskypro-v2
          file: ./images/lskypro-v2/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lskypro-v2
          cache-to: type=gha,scope=lskypro-v2,mode=max
