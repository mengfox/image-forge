name: Build ZJMF Finance

on:
  push:
    branches:
      - main
    tags:
      - "zjmf-finance-v*"
    paths:
      - ".github/workflows/build-zjmf-finance.yml"
      - "images/zjmf-finance/**"
  pull_request:
    paths:
      - ".github/workflows/build-zjmf-finance.yml"
      - "images/zjmf-finance/**"
  workflow_dispatch:

concurrency:
  group: build-zjmf-finance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备镜像名称
        id: prep
        shell: bash
        run: |
          echo "ghcr_image=ghcr.io/${{ github.repository_owner }}/image-forge/zjmf-finance" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/zjmf-finance" >> "$GITHUB_OUTPUT"

      - name: 初始化 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 登录 Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.ghcr_image }}
            ${{ steps.prep.outputs.dockerhub_image }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=zjmf-finance
            org.opencontainers.image.description=ZJMF Finance runtime image

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: ./images/zjmf-finance
          file: ./images/zjmf-finance/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=zjmf-finance
          cache-to: type=gha,scope=zjmf-finance,mode=max
