name: Build ZJMF Finance

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-zjmf-finance.yml"
      - "images/zjmf-finance/**"
  pull_request:
    paths:
      - ".github/workflows/build-zjmf-finance.yml"
      - "images/zjmf-finance/**"
  workflow_dispatch:

concurrency:
  group: build-zjmf-finance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: prep
        shell: bash
        run: |
          echo "ghcr_image=ghcr.io/${{ github.repository_owner }}/image-forge/zjmf-finance" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=docker.io/${{ secrets.DOCKERHUB_USERNAME }}/zjmf-finance" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.ghcr_image }}
            ${{ steps.prep.outputs.dockerhub_image }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=zjmf-finance
            org.opencontainers.image.description=ZJMF Finance runtime image

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./images/zjmf-finance/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max